<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Vertientes del Pedemonte</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">

        <!-- MAPA -->
        <div class="map-container">
            <div class="map-header">
                <a href="https://www.instagram.com/imesc.ffyl/" 
                   target="_blank" 
                   rel="noopener noreferrer" 
                   class="header-logo-link">
                    <img src="proyecto vertientes.png" 
                         alt="Proyecto" 
                         class="header-logo-img">
                </a>

                <h1>MAPA DE VERTIENTES DEL PEDEMONTE</h1>
            </div>

            <iframe 
                src="https://www.google.com/maps/d/embed?mid=1RsRvKOlB0ncYXJQTvid4tEkcGKAVXe0&ehbc=2E312F" 
                id="map" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>

        <!-- PANEL DERECHO -->
        <div class="sidebar-right">

            <!-- NOTICIA -->
            <h3>Noticias de Vertientes del Pedemonte</h3>

            <div id="news-section" class="news-section">

                <div class="news-item">
                    <img src="https://placehold.co/400x200/8BC34A/000000?text=VERTIENTES DEL PEDEMONTE"
                         alt="Mapa de Riesgo"
                         loading="lazy"
                         style="width:100%; border-radius: 6px;">
                    
                    <p style="margin-top: 10px;">
                        <strong>Vertientes del Pedemonte</strong><br>
                        Riesgo de incendios - Mapeo
                    </p>

                    <a href="https://www.elsol.com.ar/mendoza/video-el-fuego-llego-a-lujan-y-hay-preocupacion-en-el-pedemonte/"
                       target="_blank"
                       rel="noopener noreferrer"
                       style="color: var(--color-blanco); font-weight: bold; text-decoration: underline;">
                       Leer noticias →
                    </a>
                </div>

            </div>

            <hr style="border-top: 1px solid rgba(255, 255, 255, 0.2); margin: 30px 0;">

            <!-- VIDEO -->
            <h3>Vertientes del Pedemonte Mapeo Riesgos 2025-2026</h3>

            <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; margin-top: 15px;">
                <iframe width="560" height="315" src="Así fue el combate de los incendios en el piedemonte que afectaron unas 4.000 hectáreas..mp4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>

            <p style="text-align: center; margin-top: 10px; font-size: 14px; color: var(--color-blanco);">
                Click para ver video YouTube
            </p>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
